    <title>Shop</title>
</head>
<body>
    <div class="wrapper">
        <div class="wrapper2">
            <header class="header">
                <div class="header_left">
                    <div class="logo">
                        <svg viewBox="0 0 31.90909 31.90909" version="1.1" id="svg1" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">
                            <g id="g5" transform="translate(-61.3636389,-71.3863592)">
                                <circle class="Background" style="fill:#0a331e;fill-opacity:1;fill-rule:evenodd;stroke-width:0.264583" id="path1" cx="77.318184" cy="87.340904" r="15.954545" />
                                <g id="g4" transform="matrix(0.89294894,0,0,0.7574949,8.4292301,21.365624)">
                                    <ellipse class="petal" style="fill:none;fill-opacity:1;fill-rule:evenodd;stroke:#ffffff;stroke-width:0.643939;stroke-dasharray:none;stroke-opacity:1" id="path2-5" ry="8.5825109" rx="4.9771986" cy="86.669884" cx="77.916397" transform="matrix(0.99997479,0.00710014,-0.00666787,0.99997777,0,0)" />

                                    <ellipse class="petal" style="fill:none;fill-opacity:1;fill-rule:evenodd;stroke:#ffffff;stroke-width:0.663329;stroke-dasharray:none;stroke-opacity:1" id="path2-8" ry="7.2217212" rx="6.2766562" cy="56.139534" cx="76.794029" transform="matrix(0.9033542,0.42889532,0.05606451,0.99842715,0,0)" />
                                </g>
                            </g>
                        </svg>


                    </div>
                    <a href="index.html" title="Open main page">Rose and Margarita</a>
                </div>
                <div class="header_right">
                    <div class="bag_icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"  class="bag">
                            <path class="bag_body" d="M5 7h14l1.2 12a1 1 0 0 1-1 1H4.8a1 1 0 0 1-1-1L5 7Z" />
                            <path class="bag_handle" d="M8 7a4 4 0 0 1 8 0" fill="none" stroke-width="2"/>
                        </svg>
                    </div>

                    <div class="menu">
                        <div class="hamburger">
                            <div></div>
                            <div></div>
                            <div></div>
                        </div>
                    </div>
                </div>
            </header>

            <section class="shop">
                <div class="container">
                    <p class="subtitle sectionTitle with_margin">Магазин</p>
                    <template id="product_template">
                        <article class="product">
                            <img class="product_image" src="" alt="" />
                            <p class="product_title textInfo"></p>
                            <p class="product_price textInfo"></p>
                        </article>
                    </template>
                    <section id="products" class="products"></section>
                </div>
            </section>

            <footer class="footer">
                <div id="contacts" class="container">
                    <div class="address_phone">
                        <p class="subtitle">address and phone</p>
                        <p class="textInfo">
                            st. Krasnoarmeyskaya, 7a,<br>
                            Minsk, Belarus<br>
                            <a class="textInfo" title="Call">+375 29 536 22 24</a>
                        </p>
                    </div>

                    <div class="working_hours">
                        <p class="subtitle">working hours</p>
                        <p class="textInfo">
                            Mon–Fri: 7:00&ndash;20:00<br>
                            Sat: 8:00&ndash;22:00<br>
                            Sun: 8:00&ndash;23:00
                        </p>
                    </div>

                    <div class="news">
                        <p class="subtitle">fresh news</p>
                        <form method="POST" action="#" class="formNews" onsubmit="return signForNews(event)">
                            <label for="newsEmail" class="textInfo">Subscribe to the newsletter</label><br>
                            <input id="newsEmail" type="email" placeholder="Add your email*"  required/>
                            <button type="submit">ok</button>
                        </form>
                    </div>

                </div>
                <div class="copyright">
                    <p class="textInfo">&copy; 2035 ROSE AND MARGARITA.</p>
                </div>
            </footer>

            <div class="overlay" id="menu_overlay" hidden></div>

            <nav class="offcanvas" id="site_menu">
                <div class="offcanvas_close" id="menu_close">
                    <div></div>
                    <div></div>
                </div>
                <ul class="offcanvas_list">
                    <li><a class="offcanvas_link textInfo" href="index.html" title="Open main page">main</a></li>
                    <li><a class="offcanvas_link textInfo" href="index.html#aboutUs" title="Open information about us">about us</a></li>
                    <li><a class="offcanvas_link textInfo" href="shop.html" title="Open shop" target="_blank">shop</a></li>
                    <li><a class="offcanvas_link textInfo" href="master_classes.html" title="Open page about master classes" target="_blank">master classes</a></li>
                    <li><a class="offcanvas_link textInfo" href="#contacts" title="Open information about address and phone">address and phone</a></li>
                </ul>
            </nav>

        </div>
